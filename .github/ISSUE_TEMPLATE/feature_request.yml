name: Feature Request
description: 기능 제안을 남길 때 사용합니다.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 배경/문제
      description: 어떤 문제를 해결하고 싶은지 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 기능과 기대 효과를 작성해 주세요.
    validations:
      required: true
