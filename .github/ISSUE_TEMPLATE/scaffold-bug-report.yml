name: Scaffold bug report
description: Report a bug in create-assignment scaffolding
title: "[Scaffold Bug] "
labels: ["bug", "scaffold"]
body:
  - type: input
    id: cli_command
    attributes:
      label: Command used
      placeholder: pnpm create-assignment --name ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, pnpm versions
